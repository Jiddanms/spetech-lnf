
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spetech Lost and Found | SMP Techno</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <img src="assets/img/logo.png" alt="Logo" class="logo-img">
                <h1>Spetech LNF</h1>
            </div>
            <nav class="sidebar-nav">
                <button class="side-btn active" id="btn-page-home" data-page="home">
                    <span>🏠</span> Home
                </button>
                <button class="side-btn" id="btn-page-lost" data-page="lost">
                    <span>🔍</span> Lost
                </button>
                <button class="side-btn" id="btn-page-found" data-page="found">
                    <span>🎁</span> Found
                </button>
                <button class="side-btn hidden" id="btn-page-admin" data-page="admin">
                    <span>🛠️</span> Admin
                </button>
                <button class="side-btn" id="btn-page-account" data-page="account">
                    <span>👤</span> Account
                </button>
            </nav>
        </aside>

        <main class="main-content">
            
            <section id="page-home" class="page">
                <header class="page-header">
                    <h2>Dashboard Sekolah</h2>
                    <p class="text-muted">Selamat datang di Sistem Lost and Found SMP Techno.</p>
                </header>
                
                <div class="stats-grid grid-container">
                    <div class="card stat-card">
                        <h3>Barang Temuan Baru</h3>
                        <div id="home-recent-found" class="recent-list">
                            </div>
                    </div>
                </div>
            </section>

            <section id="page-lost" class="page hidden">
                <nav class="sub-navbar">
                    <button class="nav-btn active" data-sub="list">Daftar Barang</button>
                    <button class="nav-btn" data-sub="report">Lapor Kehilangan</button>
                </nav>

                <div id="sub-lost-list" class="subpage">
                    <div id="lost-list-container" class="grid-container"></div>
                </div>

                <div id="sub-lost-report" class="subpage hidden">
                    <div class="form-container">
                        <h3>Form Kehilangan Barang</h3>
                        <form id="form-lost">
                            <div class="input-group">
                                <label>Nama Barang</label>
                                <input type="text" name="item_name" placeholder="Contoh: Kunci Motor" required>
                            </div>
                            <div class="input-group">
                                <label>Lokasi Terakhir Diingat</label>
                                <select name="location_name" required>
                                    <option value="">Pilih Lokasi...</option>
                                    <option>Gedung A</option><option>Gedung B</option><option>Gedung C</option>
                                    <option>Kantin</option><option>Koperasi</option><option>Lapangan</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>Deskripsi Detail</label>
                                <textarea name="description" placeholder="Warna, merk, atau ciri khusus..."></textarea>
                            </div>
                            <button type="button" id="btn-submit-lost" class="btn-primary">Kirim Laporan</button>
                        </form>
                    </div>
                </div>
            </section>

            <section id="page-found" class="page hidden">
                <nav class="sub-navbar">
                    <button class="nav-btn active" data-sub="report">Lapor Barang</button>
                    <button class="nav-btn" data-sub="list">Daftar Kehilangan</button>
                </nav>

                <div id="sub-found-report" class="subpage">
                    <div class="form-container">
                        <h3>Lapor Penemuan Barang</h3>
                        <form id="form-found">
                            <div class="input-group">
                                <label>Nama Barang yang Ditemukan</label>
                                <input type="text" name="item_name" required>
                            </div>
                            <div class="input-group">
                                <label>Lokasi Penemuan (Auto-fill via QR)</label>
                                <input type="text" id="found-location-input" name="location_name" placeholder="Scan QR atau isi manual" required>
                            </div>
                            <div class="input-group">
                                <label>Foto Barang</label>
                                <input type="file" id="found-photo" accept="image/*">
                            </div>
                            <div class="input-group">
                                <label>Nama Penemu</label>
                                <input type="text" name="reporter_name" required>
                            </div>
                            <button type="button" id="btn-submit-found" class="btn-primary">Posting Penemuan</button>
                        </form>
                    </div>
                </div>

                <div id="sub-found-list" class="subpage hidden">
                    <div id="found-list-container" class="grid-container"></div>
                </div>
            </section>

            <section id="page-admin" class="page hidden">
                <nav class="sub-navbar">
                    <button class="nav-btn active" data-sub="forms">Form Management</button>
                    <button class="nav-btn" data-sub="accounts">Account Management</button>
                    <button class="nav-btn" data-sub="locations">Location Management</button>
                </nav>
                
                <div id="sub-admin-forms" class="subpage">
                    <div id="admin-forms-table" class="admin-table-wrapper">
                        </div>
                </div>

                <div id="sub-admin-locations" class="subpage hidden">
                    <div class="form-container">
                        <h4>Tambah Lokasi QR Baru</h4>
                        <div class="input-group">
                            <input type="text" id="new-location-name" placeholder="Nama Gedung/Area">
                            <button class="btn-primary" style="margin-top:10px" onclick="addLocation()">Simpan Lokasi</button>
                        </div>
                    </div>
                    <div id="admin-locations-list" class="grid-container"></div>
                </div>
            </section>

            <section id="page-account" class="page hidden">
                <div id="sub-account-login" class="subpage">
                    <div class="form-container">
                        <h3 id="account-status-text">Login ke Spetech LNF</h3>
                        <form id="form-login">
                            <div class="input-group">
                                <label>Username</label>
                                <input type="text" id="login-username" required>
                            </div>
                            <div class="input-group">
                                <label>Password</label>
                                <input type="password" id="login-password" required>
                            </div>
                            <button type="button" id="btn-login-action" class="btn-primary">Masuk</button>
                        </form>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/main.js"></script>

</body>
</html>
